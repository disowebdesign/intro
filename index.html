<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISO Agency — Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* ── Logo lockup ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* ── DISO letters ── */
  .diso {
    display: flex;
    align-items: center;
    gap: 0px;
    line-height: 1;
  }

  .letter {
    font-size: clamp(64px, 18vw, 148px);
    font-weight: 200;
    color: #ffffff;
    letter-spacing: clamp(4px, 2vw, 12px);
    opacity: 0;
    transform: translateY(30px);
  }

  /* The D has a flat top — replicate with custom SVG character feel via clip */
  .letter-D {
    animation: riseIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }
  .letter-I {
    animation: riseIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards;
  }
  .letter-S {
    animation: riseIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
  }
  .letter-O {
    animation: riseIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.75s forwards;
  }

  /* ── AGENCY ── */
  .agency {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 14px;
    color: #ffffff;
    opacity: 0;
    animation: fadeIn 0.7s ease 1.1s forwards;
  }

  /* ── Divider line ── */
  .divider {
    width: 0px;
    height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 32px 0 28px;
    animation: expandLine 0.6s ease 1.5s forwards;
  }

  /* ── Tagline ── */
  .tagline {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.55);
    opacity: 0;
    animation: fadeIn 0.7s ease 1.8s forwards;
  }

  /* ── Ambient glow ── */
  .glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 4s ease-in-out infinite;
    pointer-events: none;
  }

  /* ── Fade out everything at end ── */
  .scene {
    animation: sceneFadeOut 0.5s ease 3.6s forwards;
  }

  /* ── Keyframes ── */
  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes expandLine {
    to { width: 44px; }
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  @keyframes sceneFadeOut {
    to { opacity: 0; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="glow"></div>

  <div class="logo-wrap">
    <div class="diso">
      <span class="letter letter-D">D</span>
      <span class="letter letter-I">I</span>
      <span class="letter letter-S">S</span>
      <span class="letter letter-O">O</span>
    </div>
    <div class="agency">AGENCY</div>
  </div>

  <div class="divider"></div>

</div>

</body>
</html>
